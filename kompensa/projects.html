<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Kompensa – Projekt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="/kompensa/favicon-32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/kompensa/favicon-64.png">

  <link rel="stylesheet" href="style.css">
</head>
<body class="kompensa-projects-page">

  <main class="projects-page">
    <section class="projects-header">
      <div>
        <p class="projects-eyebrow">Kompensa</p>
        <h1>Projekt</h1>
        <p class="projects-subtitle">
          Här hanterar du dina analyser och öppnar tidigare projekt.
        </p>
      </div>
    </section>

    <section id="empty-state" class="empty-state" style="display: none;">
      <div class="empty-state-card">
        <div class="empty-state-icon">+</div>
        <h2>Inga projekt än</h2>
        <p>
          Skapa ditt första projekt för att analysera närboendeersättning.
        </p>
        <button id="create-project-btn" class="primary-btn" type="button">
          Analysera nytt projekt
        </button>
      </div>
    </section>

    <section id="projects-section" class="projects-section" style="display: none;">
      <div class="projects-grid" id="projects-grid">
        <button class="project-card create-card" id="create-project-card" type="button">
          <div class="create-card-icon">+</div>
          <div class="create-card-text">
            <h2>Analysera nytt projekt</h2>
            <p>Skapa ett nytt projekt och starta en analys.</p>
          </div>
        </button>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = "http://127.0.0.1:5000";

    let projects = [];

    const emptyState = document.getElementById("empty-state");
    const projectsSection = document.getElementById("projects-section");
    const projectsGrid = document.getElementById("projects-grid");
    const createProjectBtn = document.getElementById("create-project-btn");
    const createProjectCard = document.getElementById("create-project-card");

    async function fetchProjects() {
      const response = await fetch(`${API_BASE}/projects`, {
        credentials: "include"
      });

      if (response.status === 401) {
        window.location.href = "/kompensa/login.html";
        return null;
      }

      if (!response.ok) {
        throw new Error("Kunde inte hämta projekt från backend.");
      }

      return await response.json();
    }

    async function initProjectsPage() {
      try {
        const data = await fetchProjects();

        if (!data) return;

        projects = data;

        if (projects.length === 0) {
          emptyState.style.display = "flex";
          projectsSection.style.display = "none";
        } else {
          emptyState.style.display = "none";
          projectsSection.style.display = "block";
          renderProjects();
        }
      } catch (error) {
        console.error(error);
        emptyState.style.display = "flex";
        projectsSection.style.display = "none";
      }
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString("sv-SE");
    }

    function renderProjects() {
      document.querySelectorAll(".existing-project-card").forEach(card => card.remove());

      projects.forEach(project => {
        const projectCard = document.createElement("button");
        projectCard.type = "button";
        projectCard.className = "project-card existing-project-card";

        projectCard.innerHTML = `
          <div class="project-card-top">
            <span class="project-badge">Projekt</span>
          </div>

          <div class="project-card-body">
            <h3>${project.name}</h3>
            <p class="project-meta">Företag: ${project.company}</p>
            <p class="project-meta">Senast ändrad: ${formatDate(project.updatedAt)}</p>
          </div>
        `;

        projectCard.addEventListener("click", () => {
          window.location.href = "project.html?project=" + encodeURIComponent(project.id);
        });

        projectsGrid.appendChild(projectCard);
      });
    }

    function handleCreateProject() {
      window.location.href = "create_project.html";
    }

    createProjectBtn?.addEventListener("click", handleCreateProject);
    createProjectCard?.addEventListener("click", handleCreateProject);

    initProjectsPage();
  </script>
</body>
</html>
