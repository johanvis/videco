<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kompensa | ViDeCo</title>
  <meta
    name="description"
    content="Kompensa är ett digitalt verktyg för beräkning av närboendeersättning för vindkraftsprojekt."
  />
  <style>
    :root {
      --bg: #f7f8f5;
      --text: #1f2a1f;
      --muted: #5f6b5f;
      --primary: #2f5d3a;
      --primary-hover: #264c2f;
      --secondary: #ffffff;
      --border: #d9e0d6;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius: 18px;
      --max-width: 760px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f7f8f5 0%, #eef2ec 100%);
      color: var(--text);
      min-height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .card {
      width: 100%;
      max-width: var(--max-width);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 56px 40px;
      text-align: center;
    }

    .brand {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0 auto 14px;
      max-width: 620px;
      font-size: 1.1rem;
      line-height: 1.6;
      color: var(--muted);
    }

    .description {
      margin: 0 auto 34px;
      max-width: 620px;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-block;
      padding: 14px 26px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      transition: 0.2s ease;
      border: 1px solid transparent;
      min-width: 160px;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--secondary);
      color: var(--text);
      border-color: var(--border);
    }

    .btn-secondary:hover {
      background: #f2f5f1;
      transform: translateY(-1px);
    }

    .footer {
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 10px;
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .card {
        padding: 40px 22px;
      }

      .btn {
        width: 100%;
        max-width: 320px;
      }

      .actions {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">ViDeCo</div>

    <h1>Kompensa</h1>

    <p class="subtitle">
      Beräkning av närboendeersättning för vindkraftsprojekt.
    </p>

    <p class="description">
      Ett digitalt verktyg för att analysera bostäder, påverkan och
      ersättningsunderlag inom ett projektområde.
    </p>

    <div class="actions">
      <a class="btn btn-primary" href="/kompensa/login.html">Logga in</a>
      <a class="btn btn-secondary" href="/kompensa/demo.html">Öppna demo</a>
    </div>

    <div class="footer">
      Utvecklat av <a href="/">ViDeCo</a>
    </div>
  </main>
</body>
</html>
