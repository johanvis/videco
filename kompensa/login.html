<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logga in | Kompensa</title>

  <!-- Kompensa CSS -->
  <link rel="stylesheet" href="/kompensa/style.css" />
</head>

<body class="kompensa-public-page page-center">

  <main class="card form-card">

    <img src="/kompensa/logo.png" alt="Kompensa" class="hero-logo form-logo">
    <h1 class="sr-only">Logga in till Kompensa</h1>

    <form onsubmit="handleLogin(event)">

      <div class="form-group">
       <label class="form-label" for="username">Användarnamn eller e-postadress</label>
        <input class="input" type="text" id="username" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Lösenord</label>
        <input class="input" type="password" id="password" required />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">
          Logga in
        </button>
      </div>

      <div id="error" class="form-error">
      Fel användarnamn eller lösenord
      </div>

    </form>

    <div class="footer" style="margin-top:20px;">
      <div>
        <a href="mailto:info@videco.se?subject=Återställ lösenord Kompensa">
          Glömt lösenordet?
        </a>
      </div>
      <div>
        <a href="mailto:info@videco.se?subject=Begär tillgång till Kompensa">
          Begär tillgång
        </a>
      </div>
    </div>

    <div class="footer">
      Utvecklat av <a href="/">Videco</a>
    </div>

  </main>
  <script src="/kompensa/config.js"></script>
  <script src="/kompensa/login.js"></script>

</body>
</html>
